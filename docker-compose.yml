version: '3.8'

services:
  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4003:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_LOG=DEBUG
      - DISABLE_DB=true
      - DISABLE_AUTH=true
    entrypoint: ["litellm"]
    command: ["--config", "/app/config.yaml", "--port", "4000", "--debug"]
    networks:
      - ia-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "4042:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: >
      http 
      --url=${NGROK_URL} 
      litellm:4000 
      --log=stdout 
      --request-header-add=ngrok-skip-browser-warning:true
    networks:
      - ia-network

networks:
  ia-network:
    driver: bridge
