version: '3.8'

services:
  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4003:4000"
    environment:
      - LITELLM_LOG=DEBUG
      - DISABLE_DB=true
      - DISABLE_AUTH=true
    entrypoint: ["litellm"]
    command: ["--config", "/app/config.yaml", "--port", "4000", "--debug"]
    configs:
      - source: litellm_config
        target: /app/config.yaml
    networks:
      - ia-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "4042:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: >
      http 
      --url=${NGROK_URL} 
      litellm:4000 
      --log=stdout 
      --request-header-add=ngrok-skip-browser-warning:true
    networks:
      - ia-network

networks:
  ia-network:
    driver: bridge

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: IALuis
          litellm_params:
            model: ollama/localIA:latest
            api_base: http://192.168.99.27:11434
            num_ctx: 16384
            temperature: 0.1
            tfs_z: 1.0
            drop_params: true
