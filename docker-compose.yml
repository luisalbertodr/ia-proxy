version: '3.8'

services:
  litellm:
    image: hwdsl2/litellm-server:latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4003:4000"
    environment:
      - LITELLM_LOG=DEBUG
      - DISABLE_DB=true
      - DISABLE_AUTH=true
    volumes:
      - ./config/litellm.yaml:/etc/litellm/config.yaml
    command: litellm --config /etc/litellm/config.yaml --port 4000 --debug
    networks:
      - ia-network

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile.proxy
    container_name: proxy-transform
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "5000:5000"
    environment:
      - LITELLM_URL=http://192.168.99.110:4003/v1/chat/completions
    networks:
      - ia-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    depends_on:
      - proxy
    ports:
      - "4042:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: >
      http 
      --url=${NGROK_URL} 
      192.168.99.110:5000 
      --log=stdout 
      --authtoken=${NGROK_AUTHTOKEN}
    networks:
      - ia-network

networks:
  ia-network:
    driver: bridge
