version: '3.8'

services:
  litellm:
    image: hwdsl2/litellm-server:latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4002:4000"
    environment:
      - LITELLM_LOG=DEBUG
      - DISABLE_DB=true
      - DISABLE_AUTH=true
      - OLLAMA_API_BASE=http://192.168.99.27:11434
    command: litellm --model ollama/localIA:latest --api_base http://192.168.99.27:11434 --port 4000 --drop_params --temperature 0.1 --add_function_to_prompt --debug
    networks:
      - ia-network

  proxy:
    image: python:3.10-slim
    container_name: proxy-transform
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "5000:5000"
    environment:
      - LITELLM_URL=http://litellm:4000/v1/chat/completions
    working_dir: /app
    command: >
      sh -c "
      pip install flask requests -q &&
      cat > proxy.py << 'EOF'
      from flask import Flask, request, jsonify
      import requests, json, uuid, re, os, logging
      app = Flask(__name__)
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger(__name__)
      LITELLM_URL = os.environ.get('LITELLM_URL', 'http://litellm:4000/v1/chat/completions')
      def extract_tool_call_from_text(text):
          json_pattern = r'\\{[^{}]*\"name\"\\s*:\\s*\"[^\"]+\"\\s*,\\s*\"arguments\"\\s*:\\s*\\{[^{}]*\\}[^{}]*\\}'
          matches = re.findall(json_pattern, text)
          for match in matches:
              try:
                  parsed = json.loads(match)
                  if 'name' in parsed and 'arguments' in parsed:
                      name = parsed.get('name') or parsed.get('function_name')
                      if name:
                          return {'name': name, 'arguments': json.dumps(parsed.get('arguments', {}))}
              except:
                  continue
          func_pattern = r'\\{[^{}]*\"function_name\"\\s*:\\s*\"[^\"]+\"\\s*,\\s*\"arguments\"\\s*:\\s*\\{[^{}]*\\}[^{}]*\\}'
          matches = re.findall(func_pattern, text)
          for match in matches:
              try:
                  parsed = json.loads(match)
                  if 'function_name' in parsed and 'arguments' in parsed:
                      return {'name': parsed['function_name'], 'arguments': json.dumps(parsed['arguments'])}
              except:
                  continue
          return None
      @app.route('/v1/chat/completions', methods=['POST'])
      def proxy():
          try:
              data = request.json
              logger.info('Request recibida')
              response = requests.post(LITELLM_URL, json=data)
              result = response.json()
              if 'choices' in result and len(result['choices']) > 0:
                  message = result['choices'][0].get('message', {})
                  content = message.get('content', '')
                  if content:
                      tool_call = extract_tool_call_from_text(content)
                      if tool_call:
                          logger.info('Tool call detectado: ' + tool_call['name'])
                          result['choices'][0]['message']['content'] = None
                          result['choices'][0]['message']['tool_calls'] = [{'id': 'call_' + uuid.uuid4().hex[:8], 'type': 'function', 'function': {'name': tool_call['name'], 'arguments': tool_call['arguments']}}]
                          result['choices'][0]['finish_reason'] = 'tool_calls'
              return jsonify(result)
          except Exception as e:
              logger.error('Error: ' + str(e))
              return jsonify({'error': str(e)}), 500
      @app.route('/health', methods=['GET'])
      def health():
          return jsonify({'status': 'ok'})
      app.run(host='0.0.0.0', port=5000, debug=False)
      EOF
      python proxy.py
      "
    networks:
      - ia-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    depends_on:
      - proxy
    ports:
      - "4042:4040"
    environment:
      - NGROK_AUTHTOKEN=3Fa8xgy9ZedTaiGor4QqDHWjDnz_4YiWa15UiA1EQ5vpCGWi4
    command: http --url=palace-police-reversal.ngrok-free.dev 192.168.99.110:5000 --log=stdout
    networks:
      - ia-network

networks:
  ia-network:
    driver: bridge
