version: '3.8'

services:
  version: '3.8'

services:
  litellm:
    image: hwdsl2/litellm-server:latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4003:4000"
    environment:
      - LITELLM_LOG=DEBUG
      - DISABLE_DB=true
      - DISABLE_AUTH=true
    volumes:
      # Usamos un volumen llamado 'litellm_config'
      - litellm_config:/app/litellm.yaml
    # Montamos el archivo dentro del contenedor de esta forma:
    command: litellm --config /app/litellm.yaml --port 4000 --debug
    networks:
      - ia-network

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: proxy-transform
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "5000:5000"
    environment:
      # Usamos el nombre del servicio para comunicación interna
      - LITELLM_URL=http://litellm:4000/v1/chat/completions
    networks:
      - ia-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    depends_on:
      - proxy
    ports:
      - "4042:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: >
      http
      --url=${NGROK_URL}
      proxy:5000
      --log=stdout
      --authtoken=${NGROK_AUTHTOKEN}
    networks:
      - ia-network
      
volumes:
  litellm_config:

networks:
  ia-network:
    driver: bridge
