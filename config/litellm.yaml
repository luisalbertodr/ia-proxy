model_list:
  - model_name: localIA:latest
    litellm_params:
      model: ollama/localIA:latest
      api_base: 
      api_key: sk-local-placeholder-key
      drop_params: true
      custom_llm_provider: ollama
      max_tokens: 8192
      temperature: 0.1
      add_function_to_prompt: true

litellm_settings:
  drop_params: true
  set_verbose: true
  cache: false
  disable_db: true
  disable_auth: true

general_settings:
  disable_db: true
  disable_auth: true
  master_key: sk-local-placeholder-key
  enable_jwt_auth: false
  use_local_db: false

environment_variables:
  DISABLE_DB: "true"
  DISABLE_AUTH: "true"
  LITELLM_LOG: "DEBUG"
