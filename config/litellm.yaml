model_list:
  - model_name: localIA:latest
    litellm_params:
      model: ollama/localIA:latest
      api_base: ${OLLAMA_API_BASE}
      api_key: sk-local-placeholder-key
      drop_params: true
      custom_llm_provider: ollama
      num_ctx: 16384           # <-- Establece la ventana de contexto que necesitas
      max_tokens: 8192
      temperature: 0.1
      tfs_z: 1.0

litellm_settings:
  drop_params: true
  drop_tools: true            # <-- Crucial para que Cursor no rompa Ollama en modo Agente
  drop_functions: true        # <-- Limpia cualquier llamada a funciones antigua de OpenAI
  turn_off_message_validation: true
  set_verbose: true
  cache: false
  disable_db: true
  disable_auth: true

general_settings:
  disable_db: true
  disable_auth: true
  master_key: sk-local-placeholder-key
  enable_jwt_auth: false
  use_local_db: false

environment_variables:
  DISABLE_DB: "true"
  DISABLE_AUTH: "true"
  LITELLM_LOG: "DEBUG"
