  disable_db: true
  disable_auth: true
general_settings:
  disable_db: true
  disable_auth: true
  master_key: sk-local-placeholder-key
  enable_jwt_auth: false
  use_local_db: false
environment_variables:
  DISABLE_DB: "true"
  DISABLE_AUTH: "true"
  LITELLM_LOG: "DEBUG"
