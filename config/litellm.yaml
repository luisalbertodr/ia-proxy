model_list:
  - model_name: localIA:latest
    litellm_params:
      model: ollama_chat/localIA:latest
      api_base: http://192.168.99.27:11434
      api_key: sk-local-placeholder-key
      num_ctx: 16384
      max_tokens: 8192
      temperature: 0.1
      drop_params: true
litellm_settings:
  drop_params: true
  set_verbose: true
